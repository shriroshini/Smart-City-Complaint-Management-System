services:
  # Backend API Service
  - type: web
    name: smartcity-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://smartcity-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: smartcity-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://smartcity-backend.onrender.com/api
      - key: REACT_APP_BACKEND_URL
        value: https://smartcity-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
